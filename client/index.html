<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Shadow Arena: Tactical Ops</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #game-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #ui-root {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #ui-root .menu-screen,
    #ui-root .gameover-screen,
    #ui-root .menu-btn,
    #ui-root .hud-ability,
    #ui-root .joystick-base,
    #ui-root .mobile-abilities,
    #ui-root .mobile-ability-btn {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="ui-root"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
